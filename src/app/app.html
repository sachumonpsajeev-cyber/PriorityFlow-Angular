<div class="todo-card">
  <h1>Task Manager</h1>

  <div class="input-group">
    <input type="text" placeholder="Task name..." #taskInput (keyup.enter)="todoService.add(taskInput.value, priorityInput.value); taskInput.value=''">
    <select #priorityInput>
      <option value="Low">Low</option>
      <option value="Medium">Medium</option>
      <option value="High">High</option>
    </select>
    <button (click)="todoService.add(taskInput.value, priorityInput.value); taskInput.value=''">Add</button>
  </div>

  <div class="filter-group">
    <button (click)="todoService.currentFilter = 'All'" [class.active]="todoService.currentFilter === 'All'">All</button>
    <button (click)="todoService.currentFilter = 'Active'" [class.active]="todoService.currentFilter === 'Active'">Active</button>
    <button (click)="todoService.currentFilter = 'Completed'" [class.active]="todoService.currentFilter === 'Completed'">Done</button>
  </div>

  <ul *ngIf="todoService.filteredTasks.length > 0; else emptyMessage">
    <li *ngFor="let task of todoService.filteredTasks; let i = index">
      <div style="display: flex; align-items: center; gap: 10px; width: 100%;">
        <input type="checkbox" (change)="todoService.toggle(i)" [checked]="task.completed">
        
        <span class="badge" [ngClass]="task.priority.toLowerCase()">{{ task.priority }}</span>

        <span *ngIf="todoService.editingIndex !== i" 
              [class.done]="task.completed"
              (dblclick)="todoService.editingIndex = i"
              style="cursor: pointer; flex-grow: 1;">
          {{ task.title }}
        </span>

        <input *ngIf="todoService.editingIndex === i" 
               type="text" 
               [value]="task.title" 
               #editInput
               (blur)="todoService.updateTask(i, editInput.value)"
               (keyup.enter)="todoService.updateTask(i, editInput.value)"
               style="flex-grow: 1;">
      </div>
      <button class="delete-btn" (click)="todoService.remove(i)">Delete</button>
    </li>
  </ul>

  <ng-template #emptyMessage>
    <p style="text-align: center; color: #888; margin-top: 20px;">No tasks found!</p>
  </ng-template>
</div>
